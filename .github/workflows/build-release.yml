# ============================================================
#  build-release.yml - OTA 固件自动构建与发布
#
#  触发: push tag "v*" (如 v2.8) 或 GitHub Actions 手动运行
#  产物: gh-pages 分支下的 manifest.json + firmware.bin + c3.bin
#        (jsDelivr CDN 会缓存, 手机网页通过 cdn.jsdelivr.net 拉取)
#
#  手机端"一键升级"流程:
#    连 eBike-BSD 热点 → 192.168.4.1 → 网页自动 fetch manifest.json →
#    比对版本 → 一键升级 (走手机蜂窝数据拉 CDN, 再 POST 到 ESP32)
#
#  本地手动发布 (不打 tag, 便于调试):
#    git tag v2.8 && git push origin v2.8
# ============================================================
name: Build & Release OTA Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 V2.8, 不带 v 前缀)'
        required: true
        default: 'V2.8'
      notes:
        description: '更新说明'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限才能推 gh-pages 分支 (GITHUB_TOKEN 默认只读)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Verify firmware version matches tag (防发错版本)
        env:
          EXPECTED: ${{ steps.ver.outputs.version }}
        run: |
          # 从源码提取 FW_VERSION, 校验与 tag 一致 (手动改源码忘了同步 tag 时会 fail)
          MAIN_FW=$(grep -oP '#define FW_VERSION "\K[^"]+' firmware/src/ebike_bsd.ino | head -1)
          C3_FW=$(grep -oP '#define FW_VERSION "\K[^"]+' terminal/src/c3_terminal.ino | head -1)
          echo "主控 FW_VERSION=$MAIN_FW  C3 FW_VERSION=$C3_FW  期望(tag)=$EXPECTED"
          if [ -z "$MAIN_FW" ] || [ -z "$C3_FW" ]; then
            echo "::error::无法提取 FW_VERSION, 检查源码 #define FW_VERSION"; exit 1
          fi
          # 主控版本必须与 tag 完全一致; C3 版本可不同 (子版本号独立)
          if [ "$MAIN_FW" != "$EXPECTED" ]; then
            echo "::error::主控 FW_VERSION ($MAIN_FW) 与 tag ($EXPECTED) 不一致! 请先同步 firmware/src/ebike_bsd.ino 再发布"
            exit 1
          fi
          echo "✓ 版本一致性校验通过"

      - name: Build main controller firmware
        working-directory: firmware
        run: pio run

      - name: Build C3 terminal firmware
        id: build_c3
        working-directory: terminal
        continue-on-error: true   # C3 构建失败不阻断主控发布 (CI 首次跑有不确定性)
        run: pio run

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # tag 触发: v2.8 → V2.8
            TAG="${GITHUB_REF##*/}"
            VER="${TAG#v}"
            echo "version=V${VER}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Stage artifacts + compute sha256
        run: |
          mkdir -p staging
          cp firmware/.pio/build/esp32dev/firmware.bin staging/firmware.bin
          # C3 可能构建失败 (continue-on-error), 仅在产物存在时纳入
          HAVE_C3=0
          if [ -f terminal/.pio/build/esp32-c3-devkitm-1/firmware.bin ]; then
            cp terminal/.pio/build/esp32-c3-devkitm-1/firmware.bin staging/c3.bin
            HAVE_C3=1
          fi
          echo "have_c3=$HAVE_C3" >> $GITHUB_ENV

          cd staging
          MAIN_SHA=$(sha256sum firmware.bin | awk '{print $1}')
          MAIN_SIZE=$(stat -c%s firmware.bin)
          echo "main_sha=$MAIN_SHA" >> $GITHUB_ENV
          echo "main_size=$MAIN_SIZE" >> $GITHUB_ENV
          if [ "$HAVE_C3" = "1" ]; then
            C3_SHA=$(sha256sum c3.bin | awk '{print $1}')
            C3_SIZE=$(stat -c%s c3.bin)
            echo "c3_sha=$C3_SHA" >> $GITHUB_ENV
            echo "c3_size=$C3_SIZE" >> $GITHUB_ENV
          fi

      - name: Generate manifest.json
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          NOTES: ${{ github.event.inputs.notes }}
          MAIN_SHA: ${{ env.main_sha }}
          MAIN_SIZE: ${{ env.main_size }}
          C3_SHA: ${{ env.c3_sha }}
          C3_SIZE: ${{ env.c3_size }}
          HAVE_C3: ${{ env.have_c3 }}
        run: |
          python3 - <<'PY'
          import json, os, datetime
          notes = os.environ.get("NOTES") or "固件升级"
          manifest = {
              "version": os.environ["VERSION"],
              "date": datetime.date.today().isoformat(),
              "main_fw": "firmware.bin",
              "main_sha256": os.environ["MAIN_SHA"],
              "main_size": int(os.environ["MAIN_SIZE"]),
              "notes": notes,
          }
          # C3 可选 (CI 首次可能没构建出来)
          if os.environ.get("HAVE_C3") == "1":
              manifest["c3_fw"] = "c3.bin"
              manifest["c3_sha256"] = os.environ["C3_SHA"]
              manifest["c3_size"] = int(os.environ["C3_SIZE"])
          with open("staging/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          print("=== manifest.json ===")
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

      - name: Deploy to gh-pages (jsDelivr CDN 源)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: staging
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          commit_message: "OTA release ${{ steps.ver.outputs.version }}"

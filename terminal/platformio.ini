; PlatformIO 项目配置
; ebike-bsd 车把显示终端 (立创·实战派 ESP32-C3)
; 主控: ESP32-C3, 实测 8MB Flash (P1 阶段先用 4MB 默认分区)
; 显示: ST7789 2寸 320x240 (LovyanGFX)
; 通信: UART GPIO18/19 ← 主控 ESP32-32D UART1
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ⚠ Flash 必须设 40MHz (实战派 C3 不支持 80MHz, 否则 app 加载失败 → boot loop)
board_build.f_flash = 40000000L
board_build.flash_mode = dio

; Serial 走硬件 UART0 (GPIO21/20, 经板载 CH343 连 Type-C)
; 必须禁用 USB-Serial-JTAG (否则它会占用 GPIO18/19, 导致 UART1 无收)
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D ARDUINO_USB_HID_ON_BOOT=0

; 库依赖
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16

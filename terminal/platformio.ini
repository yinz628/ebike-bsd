; PlatformIO 项目配置
; ebike-bsd 车把显示终端 (立创·实战派 ESP32-C3)
; 主控: ESP32-C3, 8MB Flash
; 显示: ST7789 2寸 320x240 (LovyanGFX)
; 通信: UART GPIO18/19 ← 主控 ESP32-32D UART1
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 实战派 C3 实际是 8MB Flash (默认配置按 4MB, 需显式指定)
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

; 库依赖
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    ; ES8311 音频 (P4 阶段启用):
    ; esphome/ESP8311 @ ^1.0.0  ; 或用裸 I2S 驱动, 见 alert_sound.h

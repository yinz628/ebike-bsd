; PlatformIO 项目配置
; ebike-bsd 车把显示终端 (立创·实战派 ESP32-C3)
; 主控: ESP32-C3 QFN32 rev 0.4, 8MB Flash (厂商 c2 / Device 2017)
; 显示: ST7789 2寸 320x240 (LovyanGFX)
; 通信: UART1 (GPIO18/19) ← 主控 ESP32-32D UART1 (GPIO18/19 交叉对接)
;
; ============================================================
; ⚠ 烧写注意事项 (调试中踩坑总结, 必读):
; ============================================================
; 1. ESP32-C3 的 bootloader 必须烧到 0x0 (不是 ESP32 经典版的 0x1000)
;    参考: https://github.com/espressif/esptool/issues/953
;
; 2. 必须用立创出厂固件里的 stock bootloader, 不能用 PlatformIO 编译的 bootloader
;    (实测 PlatformIO 编译的 bootloader 加载完 3 段后 entry 跳转卡死, 原因未明)
;    stock bootloader 已从出厂固件提取到 tools/c3_backup/stock_bootloader.bin
;    出厂固件: esp32-c3/出厂测试固件/esp32_c3_all.bin
;
; 3. 分区表必须含 phy_init 分区, 否则 WiFi/射频初始化失败
;    default_8MB.csv 缺 phy_init → 我们用自建的 partitions_factory_8M.csv
;    (虽然本固件不含 WiFi, 但保留 phy_init 以备将来)
;
; 4. 正确烧写命令 (只烧 firmware 用 PlatformIO upload 即可;
;    首次/换分区表时用 esptool 烧三个文件):
;    python -m esptool --port COM3 --chip esp32c3 --baud 460800 \
;      --after no_reset write_flash \
;      0x0     tools/c3_backup/stock_bootloader.bin \
;      0x8000  .pio/build/esp32-c3-devkitm-1/partitions.bin \
;      0x10000 .pio/build/esp32-c3-devkitm-1/firmware.bin
;    ⚠ --after no_reset: 避免 esptool hard_reset 后 CH343 USB 消失
;
; 5. C3 烧写后若 USB 消失, 按 BOOT+RESET 进下载模式即可恢复
;
; ============================================================
; ⚠ OTA 分区表切换 (一次性破坏性操作, 必读):
; ============================================================
; 原布局 partitions_factory_8M.csv 是单 factory 分区 (无 OTA 槽).
; 要支持 OTA 升级, 必须切到 partitions_ota_8M.csv (ota_0/ota_1/otadata).
; 这是一次性破坏性重刷, 之后所有升级都走 UART OTA, 永不再动 bootloader.
;
; 切换步骤 (用 esptool 烧三个文件, 注意 app 偏移从 0x10000 改为 0x20000):
;   python -m esptool --port COM3 --chip esp32c3 --baud 460800 \
;     --after no_reset write_flash \
;     0x0     tools/c3_backup/stock_bootloader.bin \
;     0x8000  .pio/build/esp32-c3-devkitm-1/partitions.bin \
;     0x20000 .pio/build/esp32-c3-devkitm-1/firmware.bin
;
; 烧完 C3 会进入 ota_0 槽启动. 之后:
;   - 手机上传 c3.bin → 主控暂存 SPIFFS → UART1 转发 → C3 写入 ota_1 → 重启切到 ota_1
;   - 若新固件崩溃/未确认, bootloader 自动回滚到上一好槽 (永不真砖)
; ============================================================
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Flash 配置: 80MHz + DIO (与 stock bootloader 一致, 出厂固件验证可用)
board_build.f_flash = 80000000L
board_build.flash_mode = dio

; 8MB Flash + OTA A/B 双槽布局 (含 phy_init + otadata + ota_0/ota_1)
; ⚠ 首次切到此表后必须用 esptool 重刷 (见上方注释), PlatformIO upload 默认偏移可能不符.
board_upload.flash_size = 8MB
board_build.partitions = partitions_ota_8M.csv

; Serial 走硬件 UART0 (GPIO21/20, 经板载 CH343 连 Type-C)
; ARDUINO_USB_HID_ON_BOOT=0 释放 GPIO18/19 (多功能口, 留给 UART1 接主控)
; APP_VERSION 同步写入 esp_app_desc_t, 供 OTA 比对 (与 c3_terminal.ino 的 FW_VERSION 保持一致)
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D ARDUINO_USB_HID_ON_BOOT=0
    -D APP_VERSION=\"V0.2\"

; 库依赖 (无 WiFi/HTTPClient, 固件仅 ~326KB)
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16

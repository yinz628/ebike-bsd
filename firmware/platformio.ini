; PlatformIO 项目配置
; 电动自行车 BSD 转向灯系统
; 板载: ESP32 Dev Module
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 可选的 OLED 支持 (取消注释以启用)
; build_flags = 
;     -D ENABLE_OLED

; 库依赖
lib_deps = 
    ; 如需OLED显示:
    ; adafruit/Adafruit SSD1306 @ ^2.5.7
    ; adafruit/Adafruit GFX Library @ ^1.11.5

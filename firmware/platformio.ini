; PlatformIO 项目配置
; 电动自行车 BSD 转向灯系统
; 板载: ESP32 Dev Module
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; build_flags:
;   -D ENABLE_OLED        启用 OLED (已弃用, 主控不接 OLED)
;   -D ENABLE_DEBUG_LOG   启用每 2 秒的串口调试输出 (日常运行关闭以省电)
build_flags =

; 库依赖 (新克隆仓库后 pio run 会自动下载)
lib_deps =
    ; ---- 必需 (WiFi Web 控制台 + JSON 配置) ----
    bblanchon/ArduinoJson @ ^6.21.5
    mathieucarbou/AsyncTCP @ ^3.2.4
    mathieucarbou/ESPAsyncWebServer @ ^3.1.5
    ; ---- 可选 OLED 显示 ----
    ; adafruit/Adafruit SSD1306 @ ^2.5.7
    ; adafruit/Adafruit GFX Library @ ^1.11.5
